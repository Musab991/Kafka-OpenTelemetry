global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'avl-producer'
    static_configs:
      - targets: ['avl-sensor-producer:9464'] # The port you opened in .NET!

  - job_name: 'realtime-consumer'
    static_configs:
      - targets: ['realtime-tracker-consumer:9464'] # The port you opened in .NET!

  - job_name: 'overspeed-consumer'
    static_configs:
      - targets: ['overspeed-alert-consumer:9464'] # The port you opened in .NET!
